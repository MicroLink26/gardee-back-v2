name: Cron daily

on:
  schedule:
    # Tous les jours à 07h00 UTC (09h00 Paris en été)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Appel cron/daily
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          # URL-encode le secret pour éviter que % soit interprété comme
          # début d'un séquence de percent-encoding incomplète par curl/Express
          ENCODED=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['CRON_SECRET'], safe=''))")
          RESPONSE=$(curl -s -w "\nHTTP %{http_code}" "${API_URL}/cron/daily?token=${ENCODED}")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | tail -1 | grep -oE '[0-9]+')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cron failed with HTTP $HTTP_CODE"
            exit 1
          fi
